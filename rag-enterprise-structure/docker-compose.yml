services:
  qdrant:
    image: qdrant/qdrant:v1.15.2
    container_name: rag-qdrant
    # Qdrant API key auth: auto-configured by setup.sh when security is enabled
    # environment:
    #   QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - rag-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - rag-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rag-backend
    depends_on:
      - qdrant
      - ollama
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-ollama}
      OLLAMA_PORT: ${OLLAMA_PORT:-11434}
      LLM_MODEL: ${LLM_MODEL:-llama3.2:1b}
      EMBEDDING_MODEL: BAAI/bge-m3
      RELEVANCE_THRESHOLD: "0.35"
      # Security (optional - backend has secure defaults)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    volumes:
      - backend-uploads:/app/uploads
      - backend-database:/app/data
      - backend-backups:/app/backups
      - ./backend:/app
      - huggingface-cache:/root/.cache/huggingface
      - ollama-cache:/root/.ollama
    ports:
      - "${BACKEND_PORT:-8000}:8000"
      - "9998:9998"
    networks:
      - rag-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: rag-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - rag-network
    restart: unless-stopped

volumes:
  qdrant-data:
  ollama-data:
  backend-uploads:
  backend-database:
  backend-backups:
  huggingface-cache:
  ollama-cache:

networks:
  rag-network:
    driver: bridge
