<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0010"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e1e2e" stroke-width="0.6"/>
    </pattern>
    <radialGradient id="glowpurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="lockglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <!-- Grid -->
  <rect width="1280" height="320" fill="url(#grid)"/>
  <!-- Center purple glow -->
  <ellipse cx="640" cy="160" rx="480" ry="200" fill="url(#glowpurple)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="320" fill="url(#accent)"/>

  <!-- Lock icon group (left of text) -->
  <g transform="translate(148, 100)" filter="url(#glow)">
    <!-- Lock body -->
    <rect x="0" y="38" width="64" height="52" rx="8" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <!-- Lock shackle -->
    <path d="M12 38 L12 22 Q12 4 32 4 Q52 4 52 22 L52 38" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="32" cy="62" r="7" fill="url(#accent)" opacity="0.9"/>
    <rect x="29" y="62" width="6" height="12" rx="2" fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- Lock glow blob -->
  <ellipse cx="180" cy="160" rx="70" ry="70" fill="url(#lockglow)" opacity="0.5"/>

  <!-- Main title -->
  <text x="256" y="148" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" letter-spacing="-2" fill="#ececec">PrivaRAG</text>

  <!-- Accent underline -->
  <rect x="256" y="162" width="380" height="3" rx="2" fill="url(#accent)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="258" y="204" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" fill="#8e8ea0" letter-spacing="0.2">100% local RAG · No cloud · No tracking · Full GDPR compliance</text>

  <!-- Pill badges row -->
  <g transform="translate(258, 228)">
    <!-- Python -->
    <rect x="0" y="0" width="88" height="26" rx="13" fill="#1e1e2e" stroke="#3a3a5c" stroke-width="1"/>
    <text x="44" y="17.5" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#c4b5fd" text-anchor="middle">Python 3.11</text>
    <!-- FastAPI -->
    <rect x="98" y="0" width="76" height="26" rx="13" fill="#1e1e2e" stroke="#3a3a5c" stroke-width="1"/>
    <text x="136" y="17.5" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#c4b5fd" text-anchor="middle">FastAPI</text>
    <!-- React -->
    <rect x="184" y="0" width="72" height="26" rx="13" fill="#1e1e2e" stroke="#3a3a5c" stroke-width="1"/>
    <text x="220" y="17.5" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#c4b5fd" text-anchor="middle">React 18</text>
    <!-- Ollama -->
    <rect x="266" y="0" width="72" height="26" rx="13" fill="#1e1e2e" stroke="#3a3a5c" stroke-width="1"/>
    <text x="302" y="17.5" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#c4b5fd" text-anchor="middle">Ollama</text>
    <!-- Qdrant -->
    <rect x="348" y="0" width="72" height="26" rx="13" fill="#1e1e2e" stroke="#3a3a5c" stroke-width="1"/>
    <text x="384" y="17.5" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#c4b5fd" text-anchor="middle">Qdrant</text>
    <!-- Docker -->
    <rect x="430" y="0" width="72" height="26" rx="13" fill="#1e1e2e" stroke="#3a3a5c" stroke-width="1"/>
    <text x="466" y="17.5" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#c4b5fd" text-anchor="middle">Docker</text>
  </g>

  <!-- Right side decorative circuit lines -->
  <g opacity="0.15" stroke="#7c3aed" stroke-width="1" fill="none">
    <path d="M1050 60 L1150 60 L1150 130"/>
    <path d="M1050 260 L1150 260 L1150 190"/>
    <circle cx="1150" cy="160" r="30" stroke-width="1.5"/>
    <circle cx="1150" cy="160" r="15" stroke-width="1"/>
    <circle cx="1150" cy="160" r="5" fill="#7c3aed" opacity="0.6" stroke="none"/>
    <path d="M1050 160 L1120 160"/>
    <path d="M1180 160 L1240 160"/>
    <path d="M1100 60 L1100 130"/>
    <path d="M1100 190 L1100 260"/>
  </g>

  <!-- Right glow -->
  <ellipse cx="1150" cy="160" rx="120" ry="100" fill="url(#glowpurple)" opacity="0.4"/>

  <!-- Bottom border -->
  <rect x="0" y="316" width="1280" height="4" fill="url(#accent)" opacity="0.4"/>
</svg>
